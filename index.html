<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="style.css">
  <title>Live Expense Tracker</title>
</head>
<body>
<header>
  <h1>Live Expense Tracker</h1>
  <p>Monthly Budget: ₱5,000</p>
</header>

<main>
  <section class="form-section">
    <form id="expense-form">
      <div class="form-grid">

        <div>
          <label for="expense-name">Expense Name</label>
          <input
            type="text"
            id="expense-name"
            name="expense-name"
            placeholder="e.g. Grab ride"
            required
            aria-label="Expense name"
          >
        </div>

        <div>
          <label for="expense-amount">Amount (₱)</label>
          <input
            type="number"
            id="expense-amount"
            name="expense-amount"
            placeholder="0.00"
            required
            aria-label="Expense amount"
          >
        </div>

        <div>
          <label for="expense-category">Category</label>
          <select id="expense-category" name="expense-category">
            <option value="food">Food</option>
            <option value="transport">Transport</option>
            <option value="entertainment">Entertainment</option>
            <option value="other">Other</option>
          </select>
        </div>

        <button type="submit">Add Expense</button>

      </div>
    </form>
  </section>

  <section class="meter-section">
    <p>
      Budget Used:
      <span id="meter-label">₱0 / ₱5000</span>
    </p>
    <meter
      id="budget-meter"
      min="0"
      max="5000"
      value="0"
      style="width: 100%"
    ></meter>
  </section>

  <section class="filter-section">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="food">Food</button>
    <button class="filter-btn" data-filter="transport">Transport</button>
    <button class="filter-btn" data-filter="entertainment">Entertainment</button>
  </section>

  <section class="table-section">
    <table id="expense-table">

      <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Amount</th>
        <th>Action</th>
      </tr>
      </thead>

      <tbody id="expense-body">
      </tbody>

      <tfoot>
      <tr>
        <td colspan="4">
          <span id="entry-count">0 entries</span>
        </td>
      </tr>
      </tfoot>

    </table>
  </section>
</main>

<footer id="summary-bar">
  <span id="total-spent">Spent: ₱0</span>
  <span id="remaining">Remaining: ₱5,000</span>
  <span id="entry-summary">Entries: 0</span>
</footer>

<div id="save-toast" class="toast hidden">Saved!</div>

<script src="app.js"></script>

</body>
</html>
